<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#2563eb"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Informes Obra"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<title>Informes de Obra</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;min-height:100vh;background:#fff;display:flex;flex-direction:column;position:relative}
main{flex:1;overflow-y:auto;padding-bottom:72px}

/* Nav */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e2e8f0;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;font-size:11px;font-weight:600;color:#94a3b8;border:none;background:none;cursor:pointer;gap:3px;transition:color .15s}
.nav-btn.active{color:#2563eb}
.nav-btn svg{width:20px;height:20px}

/* Pages */
.page{display:none;min-height:100%}
.page.active{display:block}

/* Header */
.page-header{padding: 52px 20px 16px;border-bottom:1px solid #f1f5f9;background:#fff}
.page-header h1{font-size:20px;font-weight:700;color:#0f172a}
.hero{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;padding:56px 20px 28px}
.hero .week-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#bfdbfe;margin-bottom:4px}
.hero h1{font-size:24px;font-weight:800;letter-spacing:-.3px}
.hero .week-info{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:13px;color:#bfdbfe}

/* Cards */
.card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card+.card{margin-top:12px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;border:none;border-radius:12px;cursor:pointer;transition:all .15s;font-size:14px;padding:12px 18px}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}.btn-primary:disabled{opacity:.5;cursor:default}
.btn-secondary{background:#f1f5f9;color:#475569}.btn-secondary:hover{background:#e2e8f0}
.btn-danger{background:#fef2f2;color:#dc2626}.btn-danger:hover{background:#fee2e2}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:10px}
.btn-full{width:100%}
.btn-icon{width:36px;height:36px;padding:0;border-radius:10px}

/* Form */
.form-group{margin-bottom:16px}
label.lbl{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px}
.inp{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px 14px;font-size:14px;color:#0f172a;outline:none;font-family:inherit;transition:border-color .15s}
.inp:focus{border-color:#2563eb;background:#fff}
textarea.inp{resize:vertical;min-height:110px;line-height:1.6}

/* Section title */
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#94a3b8;margin-bottom:12px}

/* Step bar */
.step-bar{display:flex;gap:6px;justify-content:center;padding:12px 0 4px}
.step-dot{height:8px;border-radius:99px;background:#e2e8f0;transition:all .3s}
.step-dot.done{background:#93c5fd;width:8px}
.step-dot.active{background:#2563eb;width:24px}
.step-dot.pending{width:8px}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700}
.tag-blue{background:#eff6ff;color:#1d4ed8}
.tag-green{background:#f0fdf4;color:#15803d}
.tag-amber{background:#fffbeb;color:#b45309}

/* Worker row */
.worker-row{display:flex;align-items:center;gap:12px;background:#f8fafc;border-radius:12px;padding:10px 12px;margin-bottom:8px}
.worker-avatar{width:34px;height:34px;background:#dbeafe;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.worker-info{flex:1;min-width:0}
.worker-name{font-weight:600;font-size:14px;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.worker-role{font-size:12px;color:#64748b}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.spinner-sm{width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#94a3b8;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

/* Photo grid */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.photo-cell{aspect-ratio:1;border-radius:12px;overflow:hidden;position:relative;background:#f1f5f9}
.photo-cell img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(0,0,0,.6);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;line-height:1}
.photo-add{aspect-ratio:1;border-radius:12px;border:2px dashed #cbd5e1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:#94a3b8;background:none;font-size:12px;font-weight:600}
.photo-add:hover{background:#f8fafc}
.photo-add svg{width:24px;height:24px}

/* Prev week box */
.prev-box{background:#fffbeb;border:1.5px solid #fde68a;border-radius:14px;padding:14px 16px;margin-bottom:16px}
.prev-box .prev-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#92400e;margin-bottom:6px}
.prev-box p{font-size:13px;color:#78350f;line-height:1.6;white-space:pre-wrap}

/* Comparison split */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.cmp-col{background:#f8fafc;border-radius:12px;padding:12px}
.cmp-col .cmp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.cmp-col.prev .cmp-label{color:#b45309}
.cmp-col.done .cmp-label{color:#15803d}
.cmp-col p{font-size:12px;color:#374151;line-height:1.6;white-space:pre-wrap}

/* Summary rows */
.sum-row{display:flex;justify-content:space-between;align-items:start;gap:12px;padding:8px 0;border-bottom:1px solid #f1f5f9}
.sum-row:last-child{border-bottom:none}
.sum-key{font-size:12px;color:#64748b;flex-shrink:0}
.sum-val{font-size:12px;font-weight:600;color:#0f172a;text-align:right}

/* Alerts */
.alert{display:flex;align-items:start;gap:10px;padding:12px 14px;border-radius:12px;font-size:13px;font-weight:500;margin-bottom:12px}
.alert-success{background:#f0fdf4;color:#15803d}
.alert-error{background:#fef2f2;color:#b91c1c}
.alert svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}

/* Transitions */
.slide-in{animation:slideIn .2s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* Utils */
.px-4{padding-left:16px;padding-right:16px}
.py-4{padding-top:16px;padding-bottom:16px}
.py-5{padding-top:20px;padding-bottom:20px}
.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-5{margin-top:20px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}
.flex{display:flex}.gap-2{gap:8px}.gap-3{gap:12px}.items-center{align-items:center}
.text-center{text-align:center}
.text-sm{font-size:13px}.text-xs{font-size:11px}
.text-muted{color:#64748b}
.font-bold{font-weight:700}
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:56px;margin-bottom:16px}
.empty-state h2{font-size:18px;font-weight:700;color:#0f172a;margin-bottom:8px}
.empty-state p{font-size:14px;color:#64748b;margin-bottom:24px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px 20px 32px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h2{font-size:18px;font-weight:700}
.close-btn{width:32px;height:32px;background:#f1f5f9;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}

/* Form footer */
.form-footer{padding:12px 16px;border-top:1px solid #f1f5f9;background:#fff;display:flex;gap:10px}

/* Info box */
.info-box{background:#eff6ff;border-radius:12px;padding:12px 14px;font-size:12px;color:#1d4ed8;line-height:1.6;margin-top:12px}

@media (prefers-color-scheme:dark){
  body{background:#0f172a}
  #app{background:#1e293b}
  .hero{background:linear-gradient(135deg,#1e3a8a,#1d4ed8)}
  .page-header{background:#1e293b;border-color:#334155}
  .card{background:#1e293b;border-color:#334155}
  .inp{background:#0f172a;border-color:#334155;color:#f1f5f9}
  .inp:focus{background:#0f172a}
  .worker-row,.cmp-col{background:#0f172a}
  .sum-row{border-color:#334155}
  .modal{background:#1e293b}
  .close-btn{background:#334155}
  nav{background:#1e293b;border-color:#334155}
  .nav-btn{color:#475569}
  .modal-overlay{background:rgba(0,0,0,.7)}
}
</style>
</head>

<script>
// ─── STATE ────────────────────────────────────────────────────────
const DB = {
  get: (k, d) => { if(d===undefined)d=[]; try { var _v=JSON.parse(localStorage.getItem(k)); return (_v!==null&&_v!==undefined)?_v:d } catch(e) { return d } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
}

// ─── PHOTO STORE (IndexedDB — sin limite de tamaño) ───────────────
const PhotoStore = (function(){
  var _db = null
  function open(cb){
    if(_db){ cb(_db); return }
    var req = indexedDB.open('obra-photos-v1', 1)
    req.onupgradeneeded = function(e){ e.target.result.createObjectStore('photos') }
    req.onsuccess = function(e){ _db = e.target.result; cb(_db) }
    req.onerror = function(){ cb(null) }
  }
  return {
    save: function(id, dataUrl, cb){
      open(function(db){
        if(!db){ if(cb) cb(); return }
        try {
          var tx = db.transaction('photos','readwrite')
          tx.objectStore('photos').put(dataUrl, id)
          tx.oncomplete = function(){ if(cb) cb() }
          tx.onerror = function(){ if(cb) cb() }
        } catch(e){ if(cb) cb() }
      })
    },
    getAll: function(ids, cb){
      if(!ids||!ids.length){ cb({}); return }
      open(function(db){
        if(!db){ cb({}); return }
        var result = {}, pending = ids.length
        function done(){ if(--pending===0) cb(result) }
        ids.forEach(function(id){
          try {
            var tx = db.transaction('photos','readonly')
            var req = tx.objectStore('photos').get(id)
            req.onsuccess = function(){ result[id]=req.result||null; done() }
            req.onerror = function(){ done() }
          } catch(e){ done() }
        })
      })
    },
    del: function(ids){
      if(!ids||!ids.length) return
      if(typeof ids==='string') ids=[ids]
      open(function(db){
        if(!db) return
        ids.forEach(function(id){
          try { db.transaction('photos','readwrite').objectStore('photos').delete(id) } catch(e){}
        })
      })
    }
  }
})()

let projects  = DB.get('obra_projects', [])
let reports   = DB.get('obra_reports',  [])
let settings  = DB.get('obra_settings', { companyName:'PROINTER Proyectos e Instalaciones Térmicas S.L.', logoBase64:'' })
if(!settings.logoBase64) settings.logoBase64=''

function saveProjects(){ DB.set('obra_projects', projects) }
function saveReports(){  DB.set('obra_reports',  reports)  }
function saveSettings(){
  settings.companyName = $('#s-company').value
  DB.set('obra_settings', settings)
  showResult('settings-result','Ajustes guardados correctamente',true)
}

// ─── UTILS ────────────────────────────────────────────────────────
const $ = id => document.getElementById(id)
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2) }
function getWeek(d=new Date()){
  const e=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()))
  const n=e.getUTCDay()||7; e.setUTCDate(e.getUTCDate()+4-n)
  const y=new Date(Date.UTC(e.getUTCFullYear(),0,1))
  return[Math.ceil((((e-y)/86400000)+1)/7),e.getUTCFullYear()]
}
function weekRange(w,y){
  const jan1=new Date(y,0,1),off=(w-1)*7
  const s=new Date(jan1); s.setDate(jan1.getDate()+off-jan1.getDay()+1)
  if(jan1.getDay()===0) s.setDate(s.getDate()-7)
  const e=new Date(s); e.setDate(s.getDate()+6)
  const fmt=d=>d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'})
  return `${fmt(s)} – ${fmt(e)}`
}
function formatDate(d){ return new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}) }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function showResult(elId, msg, ok){
  const el=$(elId); if(!el) return
  el.innerHTML=`<div class="alert ${ok?'alert-success':'alert-error'}">${ok?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'}${esc(msg)}</div>`
  setTimeout(()=>{ if(ok) el.innerHTML='' },4000)
}

function goPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'))

let editProjectId=null
function openProjectModal(id=null){
  editProjectId=id
  const p=id?projects.find(x=>x.id===id):null
  $('pm-title').textContent=p?'Editar Obra':'Nueva Obra'
  $('pm-name').value=(p&&p.name)||''
  $('pm-code').value=(p&&p.code)||''
  $('pm-manager').value=(p&&p.managerName)||''
  $('pm-email').value=(p&&p.managerEmail)||''
  $('project-modal').style.display='flex'
}
function closeProjectModal(e){
  if(!e||e.target===$('project-modal')||e.type==='click'&&!e.target.closest('.modal')||e.currentTarget===$('project-modal')&&e.target===$('project-modal')){
    $('project-modal').style.display='none'
  }
}
function saveProject(){
  const name=$('pm-name').value.trim(),code=$('pm-code').value.trim(),email=$('pm-email').value.trim()
  if(!name||!code||!email){ alert('Nombre, código y email son obligatorios'); return }
  if(editProjectId){
    projects=projects.map(p=>p.id===editProjectId?{...p,name,code,managerName:$('pm-manager').value.trim(),managerEmail:email}:p)
  } else {
    projects.push({id:uid(),name,code,managerName:$('pm-manager').value.trim(),managerEmail:email,createdAt:new Date().toISOString()})
  }
  saveProjects(); $('project-modal').style.display='none'; renderProjects()
}
function deleteProject(id){
  const p=projects.find(x=>x.id===id)
  if(!confirm('¿Eliminar la obra "'+((p&&p.name)||'')+'"?')) return
  projects=projects.filter(x=>x.id!==id); saveProjects(); renderProjects()
}
function renderProjects(){
  const el=$('projects-list')
  if(!projects.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📁</div><h2>Sin obras</h2><p>Añade tu primera obra</p></div>'; return
  }
  el.innerHTML=projects.map(p=>`

      <div style="padding:16px;display:flex;align-items:start;gap:12px">
        <div style="flex:1;min-width:0">

          ${p.managerName?`<div style="font-size:13px;color:#374151;margin-top:2px">${esc(p.managerName)}</div>`:''}

// ─── REPORT FORM ──────────────────────────────────────────────────
const TOTAL_STEPS=5
let rf={projectId:'',weekNumber:0,year:0,worksCompleted:'',workItems:[''],workers:[],photos:[],materialsNeeded:'',materialItems:[''],nextWeekWorks:'',nextWorkItems:[''],prevPlan:'',observations:''}
let rfStep=0
let rfPdfBlob=null
let rfPdfGenerated=false
let editingReportId=null

function getProjectReports(pid){ return reports.filter(r=>r.projectId===pid).sort((a,b)=>b.year!==a.year?b.year-a.year:b.weekNumber-a.weekNumber) }
function getLastReport(pid){ return getProjectReports(pid)[0]||null }

function autoSaveDraft(){
  if(!editingReportId) return
  // Guardar fotos solo con metadatos (sin dataUrl) → localStorage no se satura
  const photosStripped = rf.photos.map(p=>({id:p.id, caption:p.caption||''}))
  reports=reports.map(r=>r.id===editingReportId?{...r,...rf,photos:photosStripped,status:r.status==='sent'?'sent':'draft',updatedAt:new Date().toISOString()}:r)
  try{ saveReports() }catch(e){ console.warn('autoSave error:',e) }
}

function startReport(projectId, reportId=null){
  const [cw,cy]=getWeek()
  let existing=null
  if(reportId){
    existing=reports.find(r=>r.id===reportId)
  } else {
    existing=reports.find(r=>r.projectId===projectId&&r.weekNumber===cw&&r.year===cy&&r.status==='draft')
  }
  function _launch(){
    rfStep=0; rfPdfBlob=null; rfPdfGenerated=false
    document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'))
    document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'))
    $('page-report').classList.add('active')
    renderStep()
  }
  if(existing){
    const wc=existing.worksCompleted||'',mn=existing.materialsNeeded||'',nw=existing.nextWeekWorks||''
    rf={projectId:existing.projectId,weekNumber:existing.weekNumber,year:existing.year,
      worksCompleted:wc,
      workItems:existing.workItems||(wc?wc.split('\n').filter(x=>x.trim()):[]),
      workers:existing.workers||[],photos:[],
      materialsNeeded:mn,
      materialItems:existing.materialItems||(mn?mn.split('\n').filter(x=>x.trim()):[]),
      nextWeekWorks:nw,
      nextWorkItems:existing.nextWorkItems||(nw?nw.split('\n').filter(x=>x.trim()):[]),
      prevPlan:existing.prevPlan||(function(){var s=getProjectReports(existing.projectId),i=s.findIndex(function(r){return r.id===existing.id}),pr=i>=0?s[i+1]:null;return(pr&&pr.nextWeekWorks)||''}()),
      observations:existing.observations||''}
    editingReportId=existing.id
    // Mostrar pantalla de informe con spinner mientras cargan las fotos de IndexedDB
    const rawPhotos = existing.photos||[]
    const idsToFetch = rawPhotos.filter(p=>!p.dataUrl).map(p=>p.id)
    if(idsToFetch.length){
      rfStep=0; rfPdfBlob=null; rfPdfGenerated=false
      document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'))
      document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'))
      $('page-report').classList.add('active')
      $('rf-content').innerHTML='<div style="text-align:center;padding:60px 0 40px"><div class="spinner"></div><p style="font-size:13px;color:#94a3b8;margin-top:14px">Cargando informe…</p></div>'
      $('rf-footer').innerHTML=''
    }
    PhotoStore.getAll(idsToFetch, function(fetched){
      rf.photos = rawPhotos.map(p=>({id:p.id, caption:p.caption||'', dataUrl:p.dataUrl||fetched[p.id]||''}))
      _launch()
    })
  } else {
    const lr=getLastReport(projectId)
    const newId=uid()
    const prevNW=(lr&&lr.nextWeekWorks)||''
    rf={projectId,weekNumber:cw,year:cy,worksCompleted:'',workItems:[''],workers:[],photos:[],
      materialsNeeded:'',materialItems:[''],nextWeekWorks:'',nextWorkItems:[''],
      prevPlan:prevNW}
    reports.push({id:newId,...rf,status:'draft',createdAt:new Date().toISOString()})
    saveReports()
    editingReportId=newId
    _launch()
  }
}

function editReport(id){
  const r=reports.find(x=>x.id===id)
  if(!r||r.status==='sent') return
  startReport(r.projectId,id)
}

function viewReport(id){
  const r=reports.find(x=>x.id===id)
  const p=projects.find(x=>x.id===(r&&r.projectId))
  if(!r||!p) return
  const rawPhotos = r.photos||[]
  const idsToFetch = rawPhotos.filter(ph=>!ph.dataUrl).map(ph=>ph.id)
  PhotoStore.getAll(idsToFetch, function(fetched){
    const photos = rawPhotos.map(ph=>({...ph, dataUrl:ph.dataUrl||fetched[ph.id]||''}))
    _showViewModal(r, p, photos)
  })
}

function deleteReport(id){
  const r=reports.find(x=>x.id===id)
  if(!r) return
  if(r.status==='sent'){ alert('No se puede eliminar un informe ya enviado.'); return }
  if(!confirm(`¿Eliminar este borrador (Semana ${r.weekNumber}/${r.year})?`)) return
  PhotoStore.del((r.photos||[]).map(p=>p.id))
  reports=reports.filter(x=>x.id!==id); saveReports(); renderHome()

// ── Lista numerada genérica ──────────────────────────────────────
// listKey   = clave en rf[] del array de items  (ej: 'workItems')
// syncKey   = clave en rf[] del string resultado (ej: 'worksCompleted')
// cid       = id del contenedor HTML
// ph0/phN   = placeholder primer item / resto
function renderItemList(listKey,syncKey,cid,ph0,phN){
  const el=$(cid); if(!el) return
  const items=rf[listKey]
  el.innerHTML=items.map((item,i)=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:13px;font-weight:700;color:#2563eb;min-width:22px;text-align:right;flex-shrink:0">${i+1}.</span>
      <input class="inp" id="${cid}-${i}" style="flex:1;padding:10px 12px;font-size:14px"
        placeholder="${i===0?ph0:phN}"
        value="${esc(item)}"
        oninput="updateItemInList('${listKey}','${syncKey}','${cid}','${ph0}','${phN}',${i},this.value)"
        onkeydown="itemListKeyDown(event,'${listKey}','${syncKey}','${cid}','${ph0}','${phN}',${i})"/>
      ${items.length>1?`<button onclick="removeItemFromList('${listKey}','${syncKey}','${cid}','${ph0}','${phN}',${i})" style="background:none;border:none;cursor:pointer;color:#cbd5e1;font-size:20px;line-height:1;flex-shrink:0;padding:0 2px">✕</button>`:''}
    </div>`).join('')
}
function updateItemInList(listKey,syncKey,cid,ph0,phN,i,val){
  rf[listKey][i]=val
  rf[syncKey]=rf[listKey].filter(x=>x.trim()).join('\n')
  if(i===rf[listKey].length-1&&val.trim()!==''){
    rf[listKey].push('')
    renderItemList(listKey,syncKey,cid,ph0,phN)
    setTimeout(()=>{ const cur=$(cid+'-'+i); if(cur){ cur.focus(); const l=cur.value.length; cur.setSelectionRange(l,l) } },10)
  }
}
function itemListKeyDown(e,listKey,syncKey,cid,ph0,phN,i){
  const items=rf[listKey]
  if(e.key==='Enter'){
    e.preventDefault()
    if(i===items.length-1){
      if(items[i].trim()!==''){
        items.push(''); renderItemList(listKey,syncKey,cid,ph0,phN)
        setTimeout(()=>{ const n=$(cid+'-'+(i+1)); if(n) n.focus() },30)
      }
    } else { const n=$(cid+'-'+(i+1)); if(n) n.focus() }
  } else if(e.key==='Backspace'&&items[i]===''&&items.length>1){
    e.preventDefault()
    removeItemFromList(listKey,syncKey,cid,ph0,phN,i)
    setTimeout(()=>{ const p=$(cid+'-'+Math.max(0,i-1)); if(p){ p.focus(); const l=p.value.length; p.setSelectionRange(l,l) } },30)
  }
}
function removeItemFromList(listKey,syncKey,cid,ph0,phN,i){
  rf[listKey].splice(i,1)
  if(rf[listKey].length===0) rf[listKey]=['']
  rf[syncKey]=rf[listKey].filter(x=>x.trim()).join('\n')
  renderItemList(listKey,syncKey,cid,ph0,phN)
}

function totalWorkers(ws){ return (ws||[]).reduce((s,w)=>s+(parseInt(w.count)||1),0) }
// Migrate old format {name,role} → new format {company,count}
function migrateWorkers(ws){ return (ws||[]).map(w=>w.company!==undefined?w:{...w,company:w.name||'',count:parseInt(w.role)||1}) }
function removeWorker(id){ rf.workers=rf.workers.filter(w=>w.id!==id); renderWorkers() }

  const v=val===''?null:parseFloat(val)
  rf.workers=rf.workers.map(w=>w.id===id?{...w,rating:(v!==null&&!isNaN(v))?Math.min(10,Math.max(0,v)):null}:w)
}
function ratingColor(v){ return v>=7?'#15803d':v>=5?'#b45309':'#dc2626' }
function ratingBg(v){   return v>=7?'#f0fdf4':v>=5?'#fffbeb':'#fef2f2' }

function getCompanyRatingData(projectId){
  const data={}
  for(const rep of getProjectReports(projectId)){
    const ws=migrateWorkers(rep.workers||[])
    for(const w of ws){
      const name=(w.company||w.name||'').trim(); if(!name) continue
      const r=parseFloat(w.rating); if(isNaN(r)) continue
      if(!data[name]) data[name]={sum:0,n:0}
      data[name].sum+=r; data[name].n++
    }
  }
  return data
}

function compressPhoto(dataUrl, cb){
  var img=new Image(); img.onload=function(){
    var MAX=1200, w=img.width, h=img.height
    if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX}else{w=Math.round(w*MAX/h);h=MAX} }
    var canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h
    canvas.getContext('2d').drawImage(img,0,0,w,h)
    cb(canvas.toDataURL('image/jpeg',0.75))
  }; img.src=dataUrl
}
function handlePhotoInput(e){
  Array.from(e.target.files).forEach(function(f){
    var r=new FileReader(); r.onload=function(ev){
      compressPhoto(ev.target.result,function(compressed){
        var id=uid()
        PhotoStore.save(id, compressed, function(){
          rf.photos.push({id:id, dataUrl:compressed, caption:''}); renderPhotos()
        })
      })
    }; r.readAsDataURL(f)
  }); e.target.value=''
}

async function handleGeneratePDF(){
  const btn=$('btn-pdf'); btn.textContent='Generando PDF…'; btn.disabled=true
  try {
    const blob=await generatePDF()
    rfPdfBlob=blob; rfPdfGenerated=true
    const url=URL.createObjectURL(blob)
    const a=document.createElement('a')
    const p=projects.find(x=>x.id===rf.projectId)
    a.href=url; a.download='Informe_'+((p&&p.code)||'')+'_S'+rf.weekNumber+'_'+rf.year+'.pdf'; a.click()
    URL.revokeObjectURL(url)
    renderStep4()
    showResult('step4-result','PDF generado y descargado correctamente',true)
  } catch(e) {
    btn.disabled=false; btn.textContent='Generar PDF'
    showResult('step4-result','Error al generar el PDF: '+e.message,false)
  }
}

function copyEmail(email){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(email).then(function(){
      showResult('step4-result','Email copiado al portapapeles',true)
    })
  } else {
    var el=document.createElement('input'); el.value=email
    document.body.appendChild(el); el.select(); document.execCommand('copy')
    document.body.removeChild(el)
    showResult('step4-result','Email copiado al portapapeles',true)
  }
}

function handleSendEmail(){
  if(!rfPdfBlob) return
  const p=projects.find(x=>x.id===rf.projectId)
  const weekStr='Semana '+rf.weekNumber+'/'+rf.year
  const filename='Informe_'+p.code+'_S'+rf.weekNumber+'_'+rf.year+'.pdf'
  const subject='['+p.code+'] Informe '+weekStr
  const btn=document.getElementById('btn-send')
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spinner-sm"></span> Enviando…' }
  const reader=new FileReader()
  reader.onload=function(e){
    const base64=e.target.result.split(',')[1]
    fetch('/api/send-report',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({to:p.managerEmail,subject:subject,htmlBody:buildEmailHtml(p,weekStr),pdfBase64:base64,pdfFilename:filename})
    }).then(function(r){
      var ct=r.headers.get('content-type')||''
      if(!ct.includes('application/json')) return r.text().then(function(t){ return {success:false,error:'HTTP '+r.status+' – '+t.substring(0,120)} })
      return r.json()
    }).then(function(data){
      if(data.success){
        reports=reports.map(r=>r.id===editingReportId?{...r,...rf,status:'sent',sentAt:new Date().toISOString()}:r)
        saveReports(); renderStep4()
        // Mensaje persistente (no desaparece) + botón verde de confirmación
        var res=$('step4-result')
        if(res) res.innerHTML='<div class="alert alert-success" style="margin-top:12px;font-size:14px;padding:14px 16px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg><div><strong>Informe enviado correctamente</strong><div style="font-size:12px;margin-top:2px;opacity:.85">Destinatario: '+esc(p.managerEmail)+'</div></div></div>'
        var sb=$('btn-send'); if(sb){ sb.style.background='#16a34a'; sb.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><polyline points="20 6 9 17 4 12"/></svg> Informe enviado' }
      } else {
        if(btn){ btn.disabled=false; renderStep4() }
        showResult('step4-result','Error al enviar: '+data.error,false)
      }
    }).catch(function(err){
      if(btn){ btn.disabled=false; renderStep4() }
      showResult('step4-result','Error al enviar: '+err.message,false)
    })
  }
  reader.readAsDataURL(rfPdfBlob)
}

function buildEmailHtml(p,weekStr){
  return`<div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto"><div style="background:#2563eb;color:#fff;padding:24px;border-radius:12px 12px 0 0"><h1 style="margin:0;font-size:20px">Informe Semanal de Obra</h1><p style="margin:8px 0 0;opacity:.8">${weekStr} · ${weekRange(rf.weekNumber,rf.year)}</p></div><div style="background:#f8fafc;padding:24px;border-radius:0 0 12px 12px;border:1px solid #e2e8f0;border-top:none"><table style="width:100%;border-collapse:collapse"><tr><td style="padding:6px 0;color:#64748b;font-size:14px">Código de obra</td><td style="padding:6px 0;font-weight:700">${p.code}</td></tr><tr><td style="padding:6px 0;color:#64748b;font-size:14px">Obra</td><td style="padding:6px 0">${p.name}</td></tr><tr><td style="padding:6px 0;color:#64748b;font-size:14px">Operarios</td><td style="padding:6px 0">${rf.workers.length}</td></tr><tr><td style="padding:6px 0;color:#64748b;font-size:14px">Fotografías</td><td style="padding:6px 0">${rf.photos.length}</td></tr></table><p style="margin:16px 0 0;color:#475569;font-size:14px">Adjunto encontrará el informe semanal completo en PDF.</p></div></div>`
}

function blobToBase64(blob){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(blob) }) }

function renderFooter(){
  const f=$('rf-footer')
  if(rfStep===TOTAL_STEPS-1){ f.innerHTML=''; return }
  const backBtn=rfStep>0?`<button class="btn btn-secondary" style="padding:12px 20px" onclick="reportBack()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px"><polyline points="15 18 9 12 15 6"/></svg> Atrás</button>`:''
  f.innerHTML=`${backBtn}<button class="btn btn-primary" style="flex:1" onclick="reportNext()">Siguiente <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px"><polyline points="9 18 15 12 9 6"/></svg></button>`
}

// ─── PDF GENERATOR ────────────────────────────────────────────────
async function generatePDF(){
  // Esperar a que jsPDF cargue (script defer)
  if(!window.jspdf){
    await new Promise(r=>{const t=setInterval(()=>{if(window.jspdf){clearInterval(t);r()}},100)})
  }
  const { jsPDF } = window.jspdf
  const doc = new jsPDF({ unit: 'mm', format: 'a4', compress: true })
  const p = projects.find(x => x.id === rf.projectId)
  // Pre-compute rating summary (used in footer strip)
  const allPdfNames=new Set()
  getProjectReports(rf.projectId).forEach(rep=>migrateWorkers(rep.workers||[]).forEach(w=>{const n=(w.company||w.name||'').trim();if(n)allPdfNames.add(n)}))
  rf.workers.forEach(w=>{const n=(w.company||'').trim();if(n)allPdfNames.add(n)})
  const rd6=allPdfNames.size?getCompanyRatingData(rf.projectId):{}
  const hasRatings=allPdfNames.size>0
  const pw = 210, ph = 297, lm = 15, rm = 15, rw = pw - lm - rm, bm = hasRatings ? 24 : 15
  let y = 0

  const BLUE=[37,99,235], DARK=[15,23,42], GRAY=[100,116,139], LIGHT=[248,250,252], LINE=[226,232,240]

  // Header
  const hasLogo=!!(settings.logoBase64)
  const headerH=hasLogo?52:44
  doc.setFillColor(...BLUE); doc.rect(0,0,pw,headerH,'F')
  if(hasLogo){
    // White box background for logo
    doc.setFillColor(255,255,255); doc.roundedRect(lm,6,38,18,2,2,'F')
    try{ doc.addImage(settings.logoBase64,lm+2,7.5,34,15,undefined,'FAST') }catch{}
    // Title & company below the logo box
    doc.setTextColor(255,255,255); doc.setFontSize(15); doc.setFont('helvetica','bold')
    doc.text('INFORME SEMANAL DE OBRA', lm, 33)
    doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(186,210,255)
    doc.text(`${settings.companyName||'Empresa'} · Climatización`, lm, 40)
  } else {
    doc.setTextColor(255,255,255); doc.setFontSize(19); doc.setFont('helvetica','bold')
    doc.text('INFORME SEMANAL DE OBRA', lm, 16)
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(186,210,255)
    doc.text(`${settings.companyName||'Empresa'} · Climatización`, lm, 23)
  }
  // Right column (week/project info)
  doc.setTextColor(255,255,255); doc.setFontSize(11); doc.setFont('helvetica','bold')
  doc.text(`SEMANA ${rf.weekNumber}/${rf.year}`, pw-rm, 12, {align:'right'})
  doc.setFontSize(8); doc.setFont('helvetica','normal')
  doc.text(weekRange(rf.weekNumber,rf.year), pw-rm, 18, {align:'right'})
  doc.setFont('helvetica','bold')
  doc.text(p.code, pw-rm, hasLogo?27:25, {align:'right'})
  doc.setFont('helvetica','normal')
  doc.text(p.name, pw-rm, hasLogo?34:31, {align:'right'})
  doc.setTextColor(186,210,255); doc.setFontSize(7.5)
  doc.text(`Jefe de Obra: ${p.managerName||p.managerEmail}`, pw-rm, hasLogo?41:37, {align:'right'})
  y = headerH + 8

  function secTitle(text, yy){
    doc.setFillColor(...BLUE); doc.roundedRect(lm,yy,rw,8,2,2,'F')
    doc.setTextColor(255,255,255); doc.setFontSize(8.5); doc.setFont('helvetica','bold')
    doc.text(text.toUpperCase(), lm+4, yy+5.5)
    return yy+12
  }
  function addPage(yy,need=40){ if(yy+need>ph-bm){ doc.addPage(); return bm } return yy }

  // 1. Comparativa
  y=secTitle('1. Comparativa con Semana Anterior',y)
  const cw2=(rw-4)/2, hh=7
  doc.setFillColor(...LIGHT); doc.rect(lm,y,cw2,hh,'F'); doc.rect(lm+cw2+4,y,cw2,hh,'F')
  doc.setFontSize(7.5); doc.setFont('helvetica','bold')
  doc.setTextColor(217,119,6); doc.text('PREVISTO (semana anterior)',lm+3,y+5)
  doc.setTextColor(22,163,74); doc.text('REALIZADO (esta semana)',lm+cw2+7,y+5)
  y+=hh+3
  const ll=doc.splitTextToSize(rf.prevPlan||'Sin planificación registrada',cw2-4)
  const rl=doc.splitTextToSize(rf.worksCompleted||'—',cw2-4)
  const rh=Math.max(ll.length,rl.length)*5+8
  y=addPage(y,rh); doc.setFillColor(...LIGHT)
  doc.roundedRect(lm,y,cw2,rh,2,2,'F'); doc.roundedRect(lm+cw2+4,y,cw2,rh,2,2,'F')
  doc.setFontSize(8); doc.setFont('helvetica','normal')
  doc.setTextColor(...GRAY); ll.forEach((l,i)=>doc.text(l,lm+3,y+5+i*5))
  doc.setTextColor(...DARK); rl.forEach((l,i)=>doc.text(l,lm+cw2+7,y+5+i*5))
  y+=rh+10

  // 2. Subcontratas
  const totOps=rf.workers.reduce((s,w)=>s+(parseInt(w.count)||0),0)
  y=addPage(y,30); y=secTitle(`2. Subcontratas Asignadas · ${totOps} operarios en total`,y)
  if(rf.workers.length){
    const rh=8
    // Header — Empresa / Ops. / Nota sem.
    doc.setFillColor(...DARK); doc.rect(lm,y,rw,rh,'F')
    doc.setTextColor(255,255,255); doc.setFontSize(7.5); doc.setFont('helvetica','bold')
    doc.text('Empresa subcontratista',lm+4,y+5.5)
    doc.text('Ops.',lm+rw*.68,y+5.5)
    doc.text('Nota sem.',lm+rw*.84,y+5.5)
    y+=rh
    rf.workers.forEach((w,i)=>{
      y=addPage(y,rh)
      doc.setFillColor(i%2===0?248:255,i%2===0?250:255,i%2===0?252:255); doc.rect(lm,y,rw,rh,'F')
      doc.setFontSize(8.5); doc.setFont('helvetica','normal')
      doc.setTextColor(...DARK); doc.text(w.company||w.name||'',lm+4,y+5.5)
      doc.setTextColor(...GRAY); doc.text(String(w.count||1),lm+rw*.68,y+5.5)
      // Nota semana
      const wr=parseFloat(w.rating)
      if(!isNaN(wr)){
        const wrc=wr>=7?[22,163,74]:wr>=5?[217,119,6]:[220,38,38]
        doc.setTextColor(...wrc); doc.setFont('helvetica','bold')
        doc.text(`${wr}/10`,lm+rw*.84,y+5.5)
      } else {
        doc.setTextColor(...GRAY); doc.text('—',lm+rw*.84,y+5.5)
      }
      y+=rh
    })
    // Total row
    y=addPage(y,rh); doc.setFillColor(239,246,255); doc.rect(lm,y,rw,rh,'F')
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(...BLUE)
    doc.text('TOTAL',lm+4,y+5.5); doc.text(String(totOps),lm+rw*.62,y+5.5); y+=rh+10
  } else { doc.setTextColor(...GRAY); doc.setFontSize(9); doc.text('Sin subcontratas registradas',lm+4,y+5); y+=14 }

  // 3. Trabajos
  y=addPage(y,30); y=secTitle('3. Descripción de Trabajos Realizados',y)
  const workLines=(rf.worksCompleted||'').split('\n').filter(x=>x.trim())
  if(workLines.length){
    workLines.forEach((item,i)=>{
      const lines=doc.splitTextToSize(item,rw-16),lh=lines.length*5+6
      y=addPage(y,lh)
      doc.setFillColor(i%2===0?248:255,i%2===0?250:255,i%2===0?252:255); doc.rect(lm,y,rw,lh,'F')
      doc.setFontSize(8.5); doc.setFont('helvetica','bold'); doc.setTextColor(...BLUE)
      doc.text(`${i+1}.`,lm+3,y+4.5)
      doc.setFont('helvetica','normal'); doc.setTextColor(...DARK)
      lines.forEach((l,j)=>doc.text(l,lm+11,y+4.5+j*5)); y+=lh
    })
    y+=10
  } else {
    doc.setFillColor(...LIGHT); doc.roundedRect(lm,y,rw,10,2,2,'F')
    doc.setTextColor(...GRAY); doc.setFontSize(9); doc.setFont('helvetica','normal')
    doc.text('—',lm+4,y+6.5); y+=18
  }

  // 3b. Observaciones
  if(rf.observations&&rf.observations.trim()){
    y=addPage(y,30); y=secTitle('3b. Observaciones del Encargado',y)
    const ol=doc.splitTextToSize(rf.observations,rw-8),oh=ol.length*5+8
    y=addPage(y,oh); doc.setFillColor(255,251,235); doc.roundedRect(lm,y,rw,oh,2,2,'F')
    doc.setDrawColor(253,230,138); doc.rect(lm,y,rw,oh)
    doc.setTextColor(120,53,15); doc.setFontSize(9); doc.setFont('helvetica','normal')
    ol.forEach((l,i)=>doc.text(l,lm+4,y+5+i*5)); y+=oh+10
  }

  // 4. Fotos
  if(rf.photos.length){
    y=addPage(y,50); y=secTitle('4. Registro Fotográfico',y)
    const cols=3,iw=(rw-(cols-1)*4)/cols,ih=iw*.75
    let col=0,ry=y
    for(const ph2 of rf.photos){
      if(col===cols){ col=0; ry+=ih+14 }
      ry=addPage(ry,ih+20)
      const x=lm+col*(iw+4)
      try{ doc.addImage(ph2.dataUrl,'JPEG',x,ry,iw,ih,undefined,'FAST'); doc.setDrawColor(...LINE); doc.rect(x,ry,iw,ih) }catch{}
      if(ph2.caption){ doc.setFontSize(7); doc.setTextColor(...GRAY); doc.text(doc.splitTextToSize(ph2.caption,iw)[0],x,ry+ih+4) }
      col++
    }
    y=ry+ih+16
  }

  // 5. Próxima semana
  y=addPage(y,60); y=secTitle(`5. Planificación Semana ${rf.weekNumber+1}/${rf.year}`,y)
  function miniNumberedList(label,text,yy){
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(...BLUE); doc.text(label,lm,yy+5); yy+=8
    const lines=(text||'').split('\n').filter(x=>x.trim())
    if(lines.length){
      lines.forEach((item,i)=>{
        const ls=doc.splitTextToSize(item,rw-16),lh=ls.length*5+6
        yy=addPage(yy,lh)
        doc.setFillColor(239,246,255); doc.rect(lm,yy,rw,lh,'F')
        doc.setFontSize(8.5); doc.setFont('helvetica','bold'); doc.setTextColor(...BLUE)
        doc.text(`${i+1}.`,lm+3,yy+4.5)
        doc.setFont('helvetica','normal'); doc.setTextColor(...DARK)
        ls.forEach((l,j)=>doc.text(l,lm+11,yy+4.5+j*5)); yy+=lh
      })
    } else {
      doc.setFillColor(239,246,255); doc.roundedRect(lm,yy,rw,10,2,2,'F')
      doc.setTextColor(...GRAY); doc.setFontSize(9); doc.setFont('helvetica','normal')
      doc.text('—',lm+4,yy+6.5); yy+=10
    }
    return yy+8
  }
  y=miniNumberedList('MATERIALES NECESARIOS',rf.materialsNeeded,y)
  y=miniNumberedList('TRABAJOS PREVISTOS',rf.nextWeekWorks,y)

  // Footer all pages
  const tp=doc.internal.getNumberOfPages()
  // Pre-build rating label parts for footer strip
  const ratingParts=[]
  if(hasRatings){
    for(const cn of allPdfNames){
      const cd6=rd6[cn]
      if(cd6){ const avg6=cd6.sum/cd6.n; ratingParts.push({name:cn,avg:avg6,n:cd6.n,hasVal:true}) }
      else ratingParts.push({name:cn,avg:null,n:0,hasVal:false})
    }
  }
  for(let i=1;i<=tp;i++){
    doc.setPage(i)
    // Ratings strip (just above footer band)
    if(hasRatings){
      doc.setFillColor(248,250,252); doc.rect(0,ph-22,pw,10,'F')
      doc.setDrawColor(...LINE); doc.line(0,ph-22,pw,ph-22)
      doc.setFontSize(6.5); doc.setFont('helvetica','bold'); doc.setTextColor(...GRAY)
      const label='Valoración media: '
      doc.text(label,lm,ph-16)
      let fx=lm+doc.getTextWidth(label)
      let first6=true
      for(const rp of ratingParts){
        if(!first6){
          doc.setFont('helvetica','normal'); doc.setTextColor(...GRAY)
          const sep=' · '; doc.text(sep,fx,ph-16); fx+=doc.getTextWidth(sep)
        }
        first6=false
        const nameStr=rp.name.length>20?rp.name.substring(0,18)+'…':rp.name
        doc.setFont('helvetica','normal'); doc.setTextColor(...DARK)
        const ns=nameStr+' '; doc.text(ns,fx,ph-16); fx+=doc.getTextWidth(ns)
        if(rp.hasVal){
          const rgb6=rp.avg>=7?[22,163,74]:rp.avg>=5?[217,119,6]:[220,38,38]
          doc.setFont('helvetica','bold'); doc.setTextColor(...rgb6)
          const as=rp.avg.toFixed(1); doc.text(as,fx,ph-16); fx+=doc.getTextWidth(as)
          doc.setFont('helvetica','normal'); doc.setTextColor(...GRAY)
          const ss=` (${rp.n}s)`; doc.text(ss,fx,ph-16); fx+=doc.getTextWidth(ss)
        } else {
          doc.setFont('helvetica','normal'); doc.setTextColor(...GRAY)
          const sv='s/v'; doc.text(sv,fx,ph-16); fx+=doc.getTextWidth(sv)
        }
        if(fx>pw-rm-5) break
      }
    }
    // Footer band
    doc.setFillColor(...LIGHT); doc.rect(0,ph-12,pw,12,'F')
    doc.setDrawColor(...LINE); doc.line(0,ph-12,pw,ph-12)
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(...GRAY)
    doc.text(`${settings.companyName||'Empresa'} · ${p.code} · Semana ${rf.weekNumber}/${rf.year} · Generado ${formatDate(new Date())}`,lm,ph-5)
    doc.text(`${i}/${tp}`,pw-rm,ph-5,{align:'right'})
  }
  return doc.output('blob')
}

// ─── MIGRACIÓN: mover fotos antiguas de localStorage a IndexedDB ──
function migratePhotosToIndexedDB(){
  var migrated=false
  reports=reports.map(function(r){
    if(!r.photos||!r.photos.length) return r
    var needsMigration=r.photos.some(function(p){ return p.dataUrl&&p.dataUrl.length>100 })
    if(!needsMigration) return r
    migrated=true
    r.photos.forEach(function(p){
      if(p.dataUrl) PhotoStore.save(p.id, p.dataUrl, null)
    })
    return Object.assign({},r,{photos:r.photos.map(function(p){ return {id:p.id,caption:p.caption||''} })})
  })
  if(migrated){ try{ saveReports() }catch(e){} }
}
