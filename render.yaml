services:
  - type: web
    name: obra-report
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 60
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: Informes de Obra <onboarding@resend.dev>
