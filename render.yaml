services:
  - type: web
    name: obra-report
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
